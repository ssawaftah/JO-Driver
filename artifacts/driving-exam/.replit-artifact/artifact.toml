kind = "web"
previewPath = "/"
title = "اختبار الفحص النظري"
version = "1.0.0"
id = "artifacts/driving-exam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18618

[services.development]
run = "pnpm --filter @workspace/driving-exam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/driving-exam", "run", "build" ]
publicDir = "artifacts/driving-exam/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18618"
BASE_PATH = "/"
